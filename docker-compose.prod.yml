services:
  db:
    image: postgis/postgis:15-3.3
    container_name: sig_tsunami_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tsunami}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sig_tsunami}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
      - ./database/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./database/seeds/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tsunami} -d ${POSTGRES_DB:-sig_tsunami}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sig_tsunami_net

  backend:
    build:
      context: ./backend
    container_name: sig_tsunami_backend_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      SENSOR_STREAM_INTERVAL_SEC: ${SENSOR_STREAM_INTERVAL_SEC:-10}
      BASELINE_WINDOW_MIN: ${BASELINE_WINDOW_MIN:-45}
      SMOOTHING_SAMPLES: ${SMOOTHING_SAMPLES:-5}
      SIREN_COOLDOWN_MIN: ${SIREN_COOLDOWN_MIN:-5}
      SIREN_NORMAL_STABLE_MIN: ${SIREN_NORMAL_STABLE_MIN:-10}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - sig_tsunami_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_URL: ${PUBLIC_APP_URL}
        REACT_APP_WS_URL: ${PUBLIC_WS_URL}
    container_name: sig_tsunami_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sig_tsunami_net

  caddy:
    image: caddy:2-alpine
    container_name: sig_tsunami_caddy_prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sig_tsunami_net

volumes:
  pg_data_prod:
  caddy_data:
  caddy_config:

networks:
  sig_tsunami_net:
    driver: bridge